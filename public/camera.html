<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP Camera Device</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #00ff88;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        video {
            width: 100%;
            max-width: 600px;
            border: 3px solid #00ff88;
            border-radius: 10px;
            background-color: #000;
        }
        .status {
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
            animation: blink 2s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="status">🔴 IP Camera is ACTIVE</div>
    
    <video id="localVideo" autoplay playsinline muted></video>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let localStream;
        let peerConnection;
        let pendingCandidates = []; 
        let currentFacingMode = 'environment'; // পিছনের ক্যামেরা ডিফল্টভাবে চালু হবে

        const configuration = { 'iceServers': [{'urls': 'stun:stun.l.google.com:19302'}] };

        async function startCamera(facingMode) {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: facingMode, width: { ideal: 640 }, height: { ideal: 480 } },
                    audio: false
                });
                document.getElementById('localVideo').srcObject = localStream;
                
                if (peerConnection) {
                    const videoTrack = localStream.getVideoTracks()[0];
                    const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
                    if (sender) sender.replaceTrack(videoTrack);
                }
            } catch (err) {
                console.error("Camera error:", err);
                alert("ক্যামেরা চালু করতে সমস্যা হচ্ছে। দয়া করে ব্রাউজারের ক্যামেরা পারমিশন চেক করুন।");
            }
        }

        socket.on('offer', async (offer) => {
            peerConnection = new RTCPeerConnection(configuration);
            
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) socket.emit('candidate', event.candidate);
            };

            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            
            for (let c of pendingCandidates) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(c));
            }
            pendingCandidates = [];

            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer', answer);
        });

        socket.on('candidate', async (candidate) => {
            if (!peerConnection || !peerConnection.remoteDescription) {
                pendingCandidates.push(candidate);
            } else {
                await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
            }
        });

        socket.on('switchCamera', () => {
            currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
            startCamera(currentFacingMode);
        });

        // পেজ লোড হলেই ক্যামেরা চালু হবে
        startCamera(currentFacingMode);
    </script>
</body>
</html>
