<!DOCTYPE html>
<html>
<head>
    <title>Camera Device</title>
</head>
<body>
    <h2>IP Camera Active</h2>
    <video id="localVideo" autoplay playsinline muted></video>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let localStream;
        let peerConnection;
        let currentFacingMode = 'environment'; // 'environment' for back, 'user' for front

        const configuration = { 'iceServers': [{'urls': 'stun:stun.l.google.com:19302'}] };

        async function startCamera(facingMode) {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            localStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: facingMode, width: 640, height: 480 },
                audio: false
            });
            document.getElementById('localVideo').srcObject = localStream;
            
            if(peerConnection) {
                const videoTrack = localStream.getVideoTracks()[0];
                const sender = peerConnection.getSenders().find(s => s.track.kind === 'video');
                sender.replaceTrack(videoTrack);
            }
        }

        socket.on('offer', async (offer) => {
            peerConnection = new RTCPeerConnection(configuration);
            
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) socket.emit('candidate', event.candidate);
            };

            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit('answer', answer);
        });

        socket.on('candidate', async (candidate) => {
            if (peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        });

        // Listen for remote switch command from Admin
        socket.on('switchCamera', () => {
            currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
            startCamera(currentFacingMode);
        });

        startCamera(currentFacingMode);
    </script>
</body>
</html>
