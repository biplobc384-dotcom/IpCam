<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
</head>
<body>
    <h2>Admin Viewer Panel</h2>
    <button onclick="startViewing()">Connect to Camera</button>
    <button onclick="switchRemoteCamera()">Switch Front/Back Camera</button>
    <br><br>
    <video id="remoteVideo" autoplay playsinline style="width: 100%; max-width: 600px; border: 2px solid #333;"></video>

    <script src="/socket.io/socket.io.js"></script>
<script>
        const socket = io();
        let peerConnection;
        let pendingCandidates = [];
        const configuration = { 'iceServers': [{'urls': 'stun:stun.l.google.com:19302'}] };

        async function startViewing() {
            peerConnection = new RTCPeerConnection(configuration);

            // আধুনিক WebRTC ভিডিও রিসিভ করার পদ্ধতি
            peerConnection.addTransceiver('video', { direction: 'recvonly' });

            peerConnection.ontrack = (event) => {
                const videoElement = document.getElementById('remoteVideo');
                if (videoElement.srcObject !== event.streams[0]) {
                    videoElement.srcObject = event.streams[0];
                }
            };

            peerConnection.onicecandidate = (event) => {
                if (event.candidate) socket.emit('candidate', event.candidate);
            };

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('offer', offer);
        }

        socket.on('answer', async (answer) => {
            if (!peerConnection) return;
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
            
            for (let c of pendingCandidates) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(c));
            }
            pendingCandidates = [];
        });

        socket.on('candidate', async (candidate) => {
            if (!peerConnection || !peerConnection.remoteDescription) {
                pendingCandidates.push(candidate);
            } else {
                await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
            }
        });

        function switchRemoteCamera() {
            socket.emit('switchCamera');
        }
    </script>
</body>
</html>
